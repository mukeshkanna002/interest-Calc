<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interest Calculator with Chennai Gold & Silver</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h2>Interest Calculator</h2>
    <label>Principal (₹): <input type="number" id="principal" /></label><br>
    <label>Rate: 
      <select id="rate">
        <option value="0.02">2%</option>
        <option value="0.05">5%</option>
        <option value="0.015">1.5%</option>
      </select>
    </label><br>
    <label>Start Date: <input type="text" id="startDate" placeholder="dd/mm/yyyy" /></label><br>
    <label>End Date: <input type="text" id="endDate" placeholder="dd/mm/yyyy" /></label><br>
    <button id="calculateBtn">Calculate</button>
    <div id="result"></div>

    <h3>Metal Prices</h3>
    <p id="goldPrice">Loading gold price...</p>
    <p id="silverPrice">Loading silver price...</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
