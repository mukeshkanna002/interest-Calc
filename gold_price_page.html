
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Gold Price in Chennai</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff8dc;
      color: #333;
      padding: 20px;
    }
    h1 {
      color: #b8860b;
    }
    #price {
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Live Gold Price in Chennai</h1>
  <div id="price">Loading...</div>

  <script>
    async function fetchGoldPrice() {
      try {
        const response = await fetch('/gold-price');
        const data = await response.json();
        if (data.error) {
          document.getElementById('price').innerText = data.error;
        } else {
          document.getElementById('price').innerHTML = `
            <p><strong>24K:</strong> ${data["24K"]}</p>
            <p><strong>22K:</strong> ${data["22K"]}</p>
            <p><strong>18K:</strong> ${data["18K"]}</p>
          `;
        }
      } catch (error) {
        document.getElementById('price').innerText = 'Failed to load gold prices.';
      }
    }

    fetchGoldPrice();
  </script>
</body>
</html>
